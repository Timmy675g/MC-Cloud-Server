version: '3.8'

services:
  mc:
    image: itzg/minecraft-server
    stop_grace_period: 1m
    container_name: mc-server-docker
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"     # Java Edition
      - "19132:19132/udp" # Bedrock Edition
    environment:
      EULA: "TRUE"
      TYPE: "CUSTOM"
      CUSTOM_SERVER: "/data/server.jar"
      MEMORY: "12G"                      # Adjust memory as necessary
      JVM_XX_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:+AlwaysPreTouch
        -XX:ParallelGCThreads=2
        -XX:ConcGCThreads=1
        -XX:MaxGCPauseMillis=20
        -XX:+UnlockDiagnosticVMOptions
        -XX:+DoEscapeAnalysis 
    volumes:
      - ./data:/data
    restart: unless-stopped
